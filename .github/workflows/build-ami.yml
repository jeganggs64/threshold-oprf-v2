name: Build Sealed Image

on:
  workflow_dispatch:

jobs:
  build:
    name: Build VHD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gdisk dosfstools qemu-utils cpio \
            grub-efi-amd64-signed shim-signed \
            busybox-static ca-certificates

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl -p toprf-node

      - name: Build sealed image
        run: |
          sudo bash image/build-image.sh \
            --binary target/x86_64-unknown-linux-musl/release/toprf-node \
            --output toprf-node-sealed.vhd

      - name: Upload VHD
        uses: actions/upload-artifact@v4
        with:
          name: sealed-image
          path: toprf-node-sealed.vhd

      - name: Upload hashes
        run: |
          sha256sum toprf-node-sealed.vhd > hashes.txt
          sha256sum target/x86_64-unknown-linux-musl/release/toprf-node >> hashes.txt
          cat hashes.txt

      - name: Upload hashes file
        uses: actions/upload-artifact@v4
        with:
          name: hashes
          path: hashes.txt
