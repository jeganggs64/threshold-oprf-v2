name: Build macOS CLIs

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build macOS CLI Binaries
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p toprf-dkg-cli -p toprf-reshare-cli
      - name: Collect binaries
        run: |
          mkdir -p artifacts
          cp target/release/toprf-dkg-cli artifacts/
          cp target/release/toprf-reshare-cli artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: macos-cli
          path: artifacts/
