name: Build Nitro Enclave Image (EIF)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build:
    name: Build Docker Image + EIF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl -p toprf-node

      - name: Build Docker image
        run: |
          cp target/x86_64-unknown-linux-musl/release/toprf-node image/nitro/toprf-node
          docker build -t toprf-node-enclave -f image/nitro/Dockerfile image/nitro/

      - name: Build EIF or save Docker image
        run: |
          mkdir -p artifacts
          if command -v nitro-cli &>/dev/null; then
            nitro-cli build-enclave \
              --docker-uri toprf-node-enclave:latest \
              --output-file artifacts/toprf-node.eif
            nitro-cli describe-eif --eif-path artifacts/toprf-node.eif | tee artifacts/pcr-values.json
          else
            docker save toprf-node-enclave:latest | gzip > artifacts/toprf-node-enclave.tar.gz
            echo "Docker image saved (build EIF locally on an EC2 instance with nitro-cli)"
          fi

      - name: Record build environment for reproducibility
        run: |
          cat > artifacts/build-info.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "rust_version": "$(rustc --version)",
            "rust_commit": "$(rustc -vV | grep 'commit-hash' | awk '{print $2}')",
            "cargo_version": "$(cargo --version)",
            "alpine_digest": "$(grep 'FROM alpine' image/nitro/Dockerfile | grep -o 'sha256:[a-f0-9]*')",
            "os": "$(lsb_release -ds 2>/dev/null || cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')"
          }
          EOF
          cat artifacts/build-info.json

      - name: Collect artifacts
        run: |
          cp target/x86_64-unknown-linux-musl/release/toprf-node artifacts/
          sha256sum artifacts/toprf-node artifacts/toprf-node-enclave.tar.gz 2>/dev/null | tee artifacts/hashes.txt
          sha256sum artifacts/toprf-node.eif 2>/dev/null >> artifacts/hashes.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: nitro-enclave-image
          path: artifacts/
