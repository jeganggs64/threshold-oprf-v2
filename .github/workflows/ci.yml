name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release

  build:
    name: Build Static Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl -p toprf-node -p toprf-dkg-node -p toprf-dkg-cli -p toprf-verify
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/x86_64-unknown-linux-musl/release/toprf-node
            target/x86_64-unknown-linux-musl/release/toprf-dkg-node
            target/x86_64-unknown-linux-musl/release/toprf-dkg-cli
            target/x86_64-unknown-linux-musl/release/toprf-verify

  integration:
    name: Integration Tests
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y jq
      - run: bash scripts/integration-test.sh
      - run: bash scripts/dkg-integration-test.sh

  sealed-image:
    name: Build Sealed Image
    needs: [check, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries/
      - name: Install image build tools
        run: sudo apt-get update && sudo apt-get install -y gdisk dosfstools qemu-utils cpio busybox-static ca-certificates grub-efi-amd64-signed shim-signed
      - name: Download Azure kernel
        run: |
          sudo apt-get install -y linux-image-azure || sudo apt-get install -y linux-image-generic
      - name: Build sealed VHD
        run: |
          sudo bash image/build-image.sh \
            --binary binaries/toprf-node \
            --output toprf-node-sealed.vhd
      - name: Compute hashes
        run: |
          echo "=== Hashes ===" | tee hashes.txt
          sha256sum toprf-node-sealed.vhd | tee -a hashes.txt
          sha256sum binaries/toprf-node | tee -a hashes.txt
      - uses: actions/upload-artifact@v4
        with:
          name: sealed-image
          path: toprf-node-sealed.vhd
      - uses: actions/upload-artifact@v4
        with:
          name: hashes
          path: hashes.txt
