name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release

  build:
    name: Build Binaries + Sealed Image
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gdisk dosfstools qemu-utils cpio

      - name: Build static binaries
        run: cargo build --release --target x86_64-unknown-linux-musl -p toprf-node -p toprf-dkg-node -p toprf-dkg-cli -p toprf-verify

      - name: Build sealed VHD
        run: |
          sudo bash image/build-image.sh \
            --binary target/x86_64-unknown-linux-musl/release/toprf-node \
            --output toprf-node-sealed.vhd

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-musl/release/toprf-node artifacts/
          cp target/x86_64-unknown-linux-musl/release/toprf-dkg-node artifacts/
          cp target/x86_64-unknown-linux-musl/release/toprf-dkg-cli artifacts/
          cp target/x86_64-unknown-linux-musl/release/toprf-verify artifacts/
          cp toprf-node-sealed.vhd artifacts/
          sha256sum artifacts/* | tee artifacts/hashes.txt

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

  integration:
    name: Integration Tests
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y jq
      - run: bash scripts/integration-test.sh
      - run: bash scripts/dkg-integration-test.sh
