# =============================================================================
# docker-compose.yml -- Local development / testing cluster
#
# Runs a 3-node threshold OPRF cluster. Each node can act as coordinator:
# receiving a client request, computing its own partial, calling a peer via
# the Docker network, and returning the combined OPRF evaluation.
#
# In production, node-to-node communication uses AWS PrivateLink.
# In local dev, the Docker bridge network is sufficient.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# Any node can serve /evaluate requests. For testing, node-1 is exposed:
#   curl -X POST http://localhost:3001/evaluate \
#     -H 'Content-Type: application/json' \
#     -d '{"blinded_point": "02..."}'
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Node 1 (coordinator + peer)
  # ---------------------------------------------------------------------------
  node-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: toprf-node-1
    ports:
      - "3001:3001"
    expose:
      - "3001"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      RUST_LOG: info
      NODE_INDEX: "1"
      THRESHOLD: "2"
      TOTAL_NODES: "3"
    command:
      - "--port"
      - "3001"
      - "--coordinator-config"
      - "/etc/toprf/coordinator.json"
    volumes:
      - ./coordinator-node-1.json:/etc/toprf/coordinator.json:ro
    networks:
      - toprf-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 2 (coordinator + peer)
  # ---------------------------------------------------------------------------
  node-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: toprf-node-2
    ports:
      - "3002:3001"
    expose:
      - "3001"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      RUST_LOG: info
      NODE_INDEX: "2"
      THRESHOLD: "2"
      TOTAL_NODES: "3"
    command:
      - "--port"
      - "3001"
      - "--coordinator-config"
      - "/etc/toprf/coordinator.json"
    volumes:
      - ./coordinator-node-2.json:/etc/toprf/coordinator.json:ro
    networks:
      - toprf-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 3 (coordinator + peer)
  # ---------------------------------------------------------------------------
  node-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: toprf-node-3
    ports:
      - "3003:3001"
    expose:
      - "3001"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      RUST_LOG: info
      NODE_INDEX: "3"
      THRESHOLD: "2"
      TOTAL_NODES: "3"
    command:
      - "--port"
      - "3001"
      - "--coordinator-config"
      - "/etc/toprf/coordinator.json"
    volumes:
      - ./coordinator-node-3.json:/etc/toprf/coordinator.json:ro
    networks:
      - toprf-net
    restart: unless-stopped

networks:
  toprf-net:
    driver: bridge
